; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_feather_nrf52840]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino
extra_scripts = deploy.py
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
build_unflags = 
	-std=gnu++11
	-std=gnu++14
	-std=gnu++17
build_flags =
	-O2
	-ffunction-sections
	-fdata-sections
	-DCFG_DEBUG=0
	-DNRF52840_XXAA
	-DBOARD_BLUEBUZZAH_NRF52
	-std=gnu++20
build_src_flags = -Wall -Wextra -Wshadow -Wconversion -Wfloat-equal -Wunused-variable -Wunused-parameter
platform_packages = platformio/toolchain-gccarmnoneeabi@^1.140201.0
upload_protocol = nrfutil
board_build.filesystem = littlefs
build_src_filter =
	+<*>
	-<ble_manager_esp32.cpp>
	-<fs_backend_esp32.cpp>
	-<fs_backend_mock.cpp>
	-<power_controller_esp32.cpp>
lib_deps =
	adafruit/Adafruit DRV2605 Library@^1.2.4
	adafruit/Adafruit NeoPixel@^1.12.0
	adafruit/Adafruit BusIO@^1.16.1
	wifwaf/TCA9548A@^1.1.3

[env:pentabuzzer_esp32s3]
; pioarduino platform: arduino-esp32 3.x on IDF 5.x with a C++20-capable GCC.
; (The official platformio espressif32 platform is frozen at arduino-esp32 2.x
; whose GCC 8.4 cannot compile this codebase's C++20.)
; 54.03.21+ required: arduino-esp32 3.2.0 leaves rmt_tx_channel_config_t.flags.allow_pd
; uninitialized, so NeoPixel RMT init fails ("not able to power down in light sleep")
; and espShow() leaks its mutex -> vTaskPriorityDisinheritAfterTimeout assert crash loop.
; https://github.com/espressif/arduino-esp32/issues/11225
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21-2/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_penta.csv
board_build.filesystem = littlefs
build_unflags =
	-std=gnu++11
build_flags =
	-DBOARD_PENTABUZZER_ESP32S3
	-std=gnu++20
	; Phone/sync commands are handled synchronously in the NimBLE host task
	; (onWrite -> onBLEMessage -> menu.handleCommand); the 4KB default overflows
	; in newlib vsnprintf ("Stack canary watchpoint triggered (nimble_host)").
	-DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192
build_src_flags = -Wall -Wextra -Wshadow -Wconversion -Wfloat-equal -Wunused-variable
build_src_filter =
	+<*>
	-<ble_manager_nrf52.cpp>
	-<fs_backend_nrf52.cpp>
	-<fs_backend_mock.cpp>
	-<power_controller_nrf52.cpp>
lib_deps =
	SPI
	adafruit/Adafruit DRV2605 Library@^1.2.4
	adafruit/Adafruit NeoPixel@^1.12.0
	adafruit/Adafruit BusIO@^1.16.1
	wifwaf/TCA9548A@^1.1.3
	h2zero/NimBLE-Arduino@^2.1.0

; =============================================================================
; NATIVE TEST ENVIRONMENT (Desktop - Fast Unit Tests)
; =============================================================================
[env:native]
platform = native
test_framework = unity
build_flags =
	-DUNITY_INCLUDE_CONFIG_H
	-DNATIVE_TEST_BUILD
	-DPIO_UNIT_TESTING
	-DARDUINO=100
	-std=c++20
	-g
	-DBOARD_BLUEBUZZAH_NRF52
	-I include
	-I test/mocks/src
lib_extra_dirs = test
build_src_filter =
	+<*>
	-<main.cpp>
	-<ble_manager_nrf52.cpp>
	-<ble_manager_esp32.cpp>
	-<hardware.cpp>
	-<menu_controller.cpp>
	-<profile_manager.cpp>
	-<state_machine.cpp>
	-<therapy_engine.cpp>
	-<sync_protocol.cpp>
	-<deferred_queue.cpp>
	-<activation_queue.cpp>
	-<fs_backend_nrf52.cpp>
	-<fs_backend_esp32.cpp>
	-<power_controller_nrf52.cpp>
	-<power_controller_esp32.cpp>
test_build_src = true
lib_compat_mode = off

; =============================================================================
; NATIVE TEST ENVIRONMENT (5-actuator PentaBuzzer configuration)
; =============================================================================
[env:native_penta]
extends = env:native
build_flags = ${env:native.build_flags} -UBOARD_BLUEBUZZAH_NRF52 -DBOARD_PENTABUZZER_ESP32S3

; =============================================================================
; NATIVE TEST WITH CODE COVERAGE (LLVM/Clang - works on macOS)
; =============================================================================
; Usage:
;   pio test -e native_coverage
;   xcrun llvm-profdata merge -sparse default.profraw -o default.profdata
;   xcrun llvm-cov report .pio/build/native_coverage/program -instr-profile=default.profdata -ignore-filename-regex='.*/test/.*'
;   xcrun llvm-cov show .pio/build/native_coverage/program -instr-profile=default.profdata -ignore-filename-regex='.*/test/.*' -format=html -output-dir=coverage
; =============================================================================
[env:native_coverage]
platform = native
test_framework = unity
build_flags =
	-DUNITY_INCLUDE_CONFIG_H
	-DNATIVE_TEST_BUILD
	-DPIO_UNIT_TESTING
	-DARDUINO=100
	-std=c++20
	-g
	-O0
	-I include
	-I test/mocks/src
	-DBOARD_BLUEBUZZAH_NRF52
	-fprofile-instr-generate
	-fcoverage-mapping
extra_scripts = scripts/coverage_flags.py
lib_extra_dirs = test
build_src_filter =
	+<*>
	-<main.cpp>
	-<ble_manager_nrf52.cpp>
	-<ble_manager_esp32.cpp>
	-<hardware.cpp>
	-<menu_controller.cpp>
	-<profile_manager.cpp>
	-<state_machine.cpp>
	-<therapy_engine.cpp>
	-<sync_protocol.cpp>
	-<deferred_queue.cpp>
	-<activation_queue.cpp>
	-<fs_backend_nrf52.cpp>
	-<fs_backend_esp32.cpp>
	-<power_controller_nrf52.cpp>
	-<power_controller_esp32.cpp>
test_build_src = true
lib_compat_mode = off

; =============================================================================
; NATIVE TEST WITH CODE COVERAGE (GCC/lcov - works on Linux CI)
; =============================================================================
; Usage:
;   pio test -e native_coverage_gcc
;   lcov --capture --directory .pio/build/native_coverage_gcc -o coverage.info
;   lcov --remove coverage.info '*/test/*' -o coverage_filtered.info
;   genhtml coverage_filtered.info -o coverage
; =============================================================================
[env:native_coverage_gcc]
platform = native
test_framework = unity
build_flags =
	-DUNITY_INCLUDE_CONFIG_H
	-DNATIVE_TEST_BUILD
	-DPIO_UNIT_TESTING
	-DARDUINO=100
	-std=c++20
	-g
	-O0
	-I include
	-I test/mocks/src
	-DBOARD_BLUEBUZZAH_NRF52
	--coverage
extra_scripts = scripts/coverage_flags_gcc.py
lib_extra_dirs = test
build_src_filter =
	+<*>
	-<main.cpp>
	-<ble_manager_nrf52.cpp>
	-<ble_manager_esp32.cpp>
	-<hardware.cpp>
	-<menu_controller.cpp>
	-<profile_manager.cpp>
	-<state_machine.cpp>
	-<therapy_engine.cpp>
	-<sync_protocol.cpp>
	-<deferred_queue.cpp>
	-<activation_queue.cpp>
	-<fs_backend_nrf52.cpp>
	-<fs_backend_esp32.cpp>
	-<power_controller_nrf52.cpp>
	-<power_controller_esp32.cpp>
test_build_src = true
lib_compat_mode = off
