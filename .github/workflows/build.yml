name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Firmware (${{ matrix.env }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env: [adafruit_feather_nrf52840, pentabuzzer_esp32s3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pip and PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Display build info
        run: |
          echo "Building BlueBuzzah Firmware"
          echo "============================"
          echo "Environment: ${{ matrix.env }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "PlatformIO: $(pio --version)"
          echo ""

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}
